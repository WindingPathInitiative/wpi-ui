@if (users().length) {
  <div class="list-group" style="max-height:150px;overflow:auto;margin-bottom:10px;">
    @for (member of users(); track member.id) {
      <button type="button" class="list-group-item list-group-item-action"
        [class.active]="member === selected()"
        [disabled]="member.membershipType !== 'Full'"
        (click)="selectMember(member)">
        {{ member.nickname }}
        @if (member.membershipNumber) { ({{ member.membershipNumber }}) }
        @else { (Non-Member) }
        @if (member.membershipType !== 'Full') { ({{ member.membershipType }}) }
      </button>
    }
  </div>
}
@if (!users().length) {
  <span>No members found for search</span>
}

<div class="row g-2 mb-2">
  <div class="col-sm-4"><label class="col-form-label">Name</label></div>
  <div class="col-sm-8"><input class="form-control" type="text" [(ngModel)]="searchParams.name" /></div>
  <div class="col-sm-4"><label class="col-form-label">Email</label></div>
  <div class="col-sm-8"><input class="form-control" type="text" [(ngModel)]="searchParams.email" /></div>
  <div class="col-sm-4"><label class="col-form-label">Member #</label></div>
  <div class="col-sm-8"><input class="form-control" type="text" [(ngModel)]="searchParams.membershipNumber" /></div>
  <div class="col-sm-4"><label class="col-form-label">Type</label></div>
  <div class="col-sm-8">
    <select class="form-select" [(ngModel)]="searchParams.type">
      @for (type of membershipTypeOptions; track type) {
        <option [value]="type" [disabled]="isDisabled(type)">{{ type }}</option>
      }
    </select>
  </div>
  <div class="col-sm-4"><label class="col-form-label">Location</label></div>
  <div class="col-sm-8">
    <app-orgunit-dropdown [(ngModel)]="searchParams.orgUnit"></app-orgunit-dropdown>
  </div>
</div>
<div class="text-center">
  <button type="button" class="btn btn-primary" (click)="search()">Search</button>
</div>
