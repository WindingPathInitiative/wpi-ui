<div class="row">
  <div class="col-sm-6">
    <form (ngSubmit)="search()">
      <div class="row g-2 mb-2">
        <div class="col-sm-4"><label class="col-form-label" for="searchName">Name</label></div>
        <div class="col-sm-8"><input class="form-control" id="searchName" type="text" [(ngModel)]="searchParams.name" name="name" /></div>
        <div class="col-sm-4"><label class="col-form-label" for="searchEmail">Email</label></div>
        <div class="col-sm-8"><input class="form-control" id="searchEmail" type="text" [(ngModel)]="searchParams.email" name="email" /></div>
        <div class="col-sm-4"><label class="col-form-label" for="searchMemberNum">Member Number</label></div>
        <div class="col-sm-8"><input class="form-control" id="searchMemberNum" type="text" [(ngModel)]="searchParams.membershipNumber" name="membershipNumber" /></div>
        <div class="col-sm-4"><label class="col-form-label" for="searchType">Membership Type</label></div>
        <div class="col-sm-8">
          <select class="form-select" id="searchType" [(ngModel)]="searchParams.type" name="type">
            @for (type of membershipTypeOptions; track type) {
              <option [value]="type">{{ type }}</option>
            }
          </select>
        </div>
      </div>
      <div class="text-center">
        <button type="submit" class="btn btn-primary">Search</button>
      </div>
    </form>
  </div>

  <div class="col-sm-6">
    @if (users().length) {
      <ul class="list-group">
        @for (member of users(); track member.id) {
          <li class="list-group-item">
            <a [routerLink]="['/members', member.id]">
              {{ member.nickname }}
              @if (member.membershipNumber) { ({{ member.membershipNumber }}) }
              @else { (Non-Member) }
            </a>
          </li>
        }
      </ul>
    } @else {
      <span>No members found for search</span>
    }
  </div>
</div>
