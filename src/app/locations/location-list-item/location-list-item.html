<span>
  @if (!fetched || children().length) {
    <button type="button" class="btn btn-link btn-sm p-0 me-1" (click)="toggle()"
      [attr.aria-label]="expanded() ? 'Collapse' : 'Expand'">
      {{ expanded() ? '▼' : '▶' }}
    </button>
  }
  <a [routerLink]="[orgUnit().id]">({{ orgUnit().code }}) {{ orgUnit().name }}</a>
  @if (expanded() && children().length) {
    <ul class="list-group mt-1">
      @for (child of children(); track child.id) {
        <li class="list-group-item">
          <app-location-list-item [orgUnit]="child" />
        </li>
      }
    </ul>
  }
</span>
