@if (editingOffice()) {
  <div class="mb-3">
    <label for="officeName" class="form-label">Office Name</label>
    <input type="text" class="form-control" id="officeName"
      [ngModel]="editingOffice().name"
      (ngModelChange)="editingOffice.update(o => ({...o, name: $event}))" required />
  </div>
  <div class="mb-3">
    <label for="officeEmail" class="form-label">Office Email</label>
    <input type="email" class="form-control" id="officeEmail"
      [ngModel]="editingOffice().email"
      (ngModelChange)="editingOffice.update(o => ({...o, email: $event}))" />
  </div>
  <div class="mb-3">
    <label class="form-label">Office Permissions</label>
    @if (!roleRows() && office()?.roles) {
      <ul>
        @for (role of office()!.roles; track role) {
          <li>{{ role }}</li>
        }
      </ul>
    }
    @if (roleRows()) {
      @for (role of roleRows()!; track role.name) {
        <div class="form-check">
          <input type="checkbox" class="form-check-input" [id]="'role' + role.name"
            [(ngModel)]="role.checked" [disabled]="role.disabled" />
          <label class="form-check-label" [for]="'role' + role.name">
            ({{ role.name }}) {{ role.label }}
          </label>
        </div>
      }
    }
  </div>
  <button type="button" class="btn btn-secondary me-2" (click)="save()">Save</button>
  <button type="button" class="btn btn-primary" (click)="cancel()">Cancel</button>
}
